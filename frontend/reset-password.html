<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — CandyCove</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">

  <!-- Visual Side -->
  <div class="auth-visual" style="background:linear-gradient(145deg,#7C5CBF,var(--lavender));">
    <div class="auth-visual-content">
      <div style="font-size:64px;margin-bottom:20px;">🔒</div>
      <div class="auth-visual-title">
        Create<br><em style="font-style:italic;">New</em><br>Password
      </div>
      <p class="auth-visual-sub">
        Choose a strong password to secure your CandyCove account.
      </p>
    </div>
  </div>

  <!-- Form Side -->
  <div class="auth-form-panel">

    <a href="index.html" class="auth-logo">
      <div class="nav-logo-mark">C</div>
      <div class="nav-logo-text">CandyCove</div>
    </a>

    <div class="auth-form-title">New Password</div>
    <div class="auth-form-sub" style="margin-bottom:28px;">
      Enter your new password below.
    </div>

    <div id="resetError" class="alert alert-error" style="display:none;margin-bottom:16px;">
      <span>⚠️</span> <span id="resetErrorMsg">Error</span>
    </div>

    <div class="form-stack">

      <input type="hidden" id="resetEmail">
      <input type="hidden" id="resetToken">

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="newPass" class="form-control" placeholder="Minimum 8 characters">
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confPass" class="form-control" placeholder="Repeat password">
      </div>

      <button class="btn btn-primary w-full btn-lg" id="resetBtn" onclick="handleReset()">
        Reset Password
      </button>

      <button class="btn btn-ghost w-full" onclick="window.location.href='login.html'">
        ← Back to Sign In
      </button>

    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const email = params.get('email');

  if (!token || !email) {
    document.getElementById('resetError').style.display = 'flex';
    document.getElementById('resetErrorMsg').textContent =
      'Invalid or expired reset link.';
    document.getElementById('resetBtn').disabled = true;
    return;
  }

  document.getElementById('resetEmail').value = decodeURIComponent(email);
  document.getElementById('resetToken').value = token;
});

async function handleReset() {
  const email    = document.getElementById('resetEmail').value;
  const token    = document.getElementById('resetToken').value;
  const newPass  = document.getElementById('newPass').value;
  const confPass = document.getElementById('confPass').value;

  if (!newPass || !confPass) {
    showError('Please fill in all fields.');
    return;
  }

  if (newPass.length < 8) {
    showError('Password must be at least 8 characters.');
    return;
  }

  if (newPass !== confPass) {
    showError('Passwords do not match.');
    return;
  }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.textContent = 'Resetting...';

  const res = await apiFetch('/resetPass', {
    method: 'PUT',
    body: JSON.stringify({
      email,
      token,
      password: newPass,
      password_confirmation: confPass
    })
  });

  btn.disabled = false;
  btn.textContent = 'Reset Password';

  if (res.ok) {
    alert('Password reset successful!');
    window.location.href = 'login.html';
  } else {
    showError(res.data?.message || 'Invalid token or email.');
  }
}

function showError(message) {
  document.getElementById('resetError').style.display = 'flex';
  document.getElementById('resetErrorMsg').textContent = message;
}
</script>

</body>
</html>
