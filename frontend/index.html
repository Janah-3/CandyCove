<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CandyCove — Sweet Escape</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>

  <!-- ══ Cursor Elements ══ -->
  <div class="cursor-outer" id="cursorOuter"></div>
  <div class="cursor-dot"   id="cursorDot"></div>

  <!-- ══ Navbar ══ -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-mark">C</div>
        <div>
          <div class="nav-logo-text">CandyCove</div>
          <div class="nav-logo-sub">not just candy, but a sweet escape</div>
        </div>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="shop.html" class="nav-link">Shop</a>
        <a href="orders.html" class="nav-link">My Orders</a>
      </div>
      <div class="nav-actions">
        <a href="cart.html" class="nav-icon-btn" title="Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge" id="cartBadge">0</span>
        </a>
        <a href="login.html" class="btn-nav-user" id="navAuthBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Sign In
        </a>
      </div>
    </div>
  </nav>

  <!-- ══ App JS ── -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const path = window.location.pathname;

        if(path.includes('forgot-password')) {
            loadForgotPasswordUI();
        } else if(path.includes('reset-password')) {
            // Grab token and email from query params
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const email = params.get('email');

            if(token && email) {
                localStorage.setItem('resetToken', token);
                localStorage.setItem('resetEmail', email);
            }
            loadResetPasswordUI();
        }
    });

    // ── Forgot Password UI ──
    function loadForgotPasswordUI() {
        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="auth-page">
            <div class="auth-form-panel">
              <div class="auth-form-title">Forgot Password</div>
              <div class="auth-form-sub" style="margin-bottom:20px;">
                Enter your email and we'll send you a reset link.
              </div>
              <div id="successAlert" class="alert alert-success" style="display:none;margin-bottom:16px;">
                <span>✅</span> Reset link sent! Check your inbox.
              </div>
              <div id="errorAlert" class="alert alert-error" style="display:none;margin-bottom:16px;">
                <span>⚠️</span> <span id="errorMsg">Email not found.</span>
              </div>
              <div class="form-stack">
                <div class="form-group">
                  <label class="form-label">Email Address</label>
                  <input type="email" id="forgotEmail" class="form-control" placeholder="hello@candycove.com">
                </div>
                <button class="btn btn-primary w-full btn-lg" onclick="sendReset()">Send Reset Link</button>
                <button class="btn btn-ghost w-full" onclick="loadHomePage()">← Back to Home</button>
              </div>
            </div>
          </div>
        `;
    }

    // ── Reset Password UI ──
    function loadResetPasswordUI() {
        const app = document.getElementById('app');
        app.innerHTML = `
          <div class="auth-page">
            <div class="auth-form-panel">
              <div class="auth-form-title">Reset Password</div>
              <div class="auth-form-sub" style="margin-bottom:20px;">
                Enter your new password below.
              </div>
              <div id="resetError" class="alert alert-error" style="display:none;margin-bottom:16px;">
                <span>⚠️</span> <span id="resetErrorMsg"></span>
              </div>
              <div class="form-stack">
                <div class="form-group">
                  <label class="form-label">New Password</label>
                  <input type="password" id="newPass" class="form-control" placeholder="Minimum 8 characters">
                </div>
                <div class="form-group">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" id="confPass" class="form-control" placeholder="Repeat password">
                </div>
                <button class="btn btn-primary w-full btn-lg" onclick="handleReset()">Reset Password</button>
              </div>
            </div>
          </div>
        `;
    }

    // ── Back to Home ──
    function loadHomePage() {
        window.location.href = 'index.html';
    }

    // ── Send Forgot Password Request ──
    async function sendReset() {
        const email = document.getElementById('forgotEmail').value.trim();
        if(!email) return alert('Enter your email');

        const res = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();

        if(data.ok) {
            document.getElementById('successAlert').style.display = 'block';
            document.getElementById('errorAlert').style.display = 'none';
        } else {
            document.getElementById('errorAlert').style.display = 'block';
            document.getElementById('successAlert').style.display = 'none';
            document.getElementById('errorMsg').textContent = data.message;
        }
    }

    // ── Handle Reset Password ──
    async function handleReset() {
        const newPass = document.getElementById('newPass').value;
        const confPass = document.getElementById('confPass').value;

        if(newPass !== confPass) {
            document.getElementById('resetError').style.display = 'block';
            document.getElementById('resetErrorMsg').textContent = "Passwords do not match!";
            return;
        }

        const token = localStorage.getItem('resetToken');
        const email = localStorage.getItem('resetEmail');

        if(!token || !email) {
            alert('Invalid reset attempt. Please request a new link.');
            window.location.href = 'forgot-password.html';
            return;
        }

        const res = await fetch('/api/reset-password', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, token, password: newPass })
        });
        const data = await res.json();

        if(data.ok) {
            alert('Password reset successful!');
            localStorage.removeItem('resetToken');
            localStorage.removeItem('resetEmail');
            window.location.href = 'login.html';
        } else {
            document.getElementById('resetError').style.display = 'block';
            document.getElementById('resetErrorMsg').textContent = data.message;
        }
    }
  </script>
</body>
</html>
