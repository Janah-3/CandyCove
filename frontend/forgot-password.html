<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — CandyCove</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">

  <!-- Visual Side -->
  <div class="auth-visual" style="background:linear-gradient(145deg,#7C5CBF,var(--lavender));">
    <div class="auth-visual-content">
      <div style="font-size:64px;margin-bottom:20px;">🔑</div>
      <div class="auth-visual-title">
        Forgot<br>Your<br><em style="font-style:italic;">Password?</em>
      </div>
      <p class="auth-visual-sub">
        No worries! We'll send a reset link to your email address.
      </p>
    </div>
  </div>

  <!-- Form Side -->
  <div class="auth-form-panel">

    <a href="index.html" class="auth-logo">
      <div class="nav-logo-mark">C</div>
      <div class="nav-logo-text">CandyCove</div>
    </a>

    <div class="auth-form-title">Reset Password</div>
    <div class="auth-form-sub" style="margin-bottom:28px;">
      Enter your email and we'll send you a reset link.
    </div>

    <div id="successAlert" class="alert alert-success" style="display:none;margin-bottom:16px;">
      <span>✅</span> Reset link sent! Check your inbox.
    </div>

    <div id="errorAlert" class="alert alert-error" style="display:none;margin-bottom:16px;">
      <span>⚠️</span> <span id="errorMsg">Email not found.</span>
    </div>

    <div class="form-stack">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="forgotEmail" class="form-control" placeholder="hello@candycove.com">
      </div>

      <button class="btn btn-primary w-full btn-lg" id="sendResetBtn" onclick="sendReset()">
        Send Reset Link
      </button>

      <button class="btn btn-ghost w-full" onclick="window.location.href='login.html'">
        ← Back to Sign In
      </button>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
async function sendReset() {
  const email = document.getElementById('forgotEmail').value.trim();

  if (!email) {
    document.getElementById('errorAlert').style.display = 'flex';
    document.getElementById('errorMsg').textContent = 'Please enter your email address.';
    return;
  }

  const btn = document.getElementById('sendResetBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  document.getElementById('errorAlert').style.display = 'none';

  const res = await apiFetch('/forgetPass', {
    method: 'POST',
    body: JSON.stringify({ email })
  });

  btn.disabled = false;
  btn.textContent = 'Send Reset Link';

  if (res.ok) {
    document.getElementById('successAlert').style.display = 'flex';
  } else {
    document.getElementById('errorAlert').style.display = 'flex';
    document.getElementById('errorMsg').textContent =
      res.data?.message || 'Email not found.';
  }
}
</script>

</body>
</html>
